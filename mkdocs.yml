site_name: Mini Pupper ROS2 Robotics Course
site_description: A collection of labs built around the Mini Pupper 2 robot
site_author: Gavin
site_url: https://minipupper-tutorial.readthedocs.io/

repo_name: MiniPupper_Tutorial
repo_url: https://github.com/Gavinw575/MiniPupper_Tutorial
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: yellow
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: yellow
      accent: black
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
   # - navigation.tabs.sticky
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - glightbox  # image zoom

markdown_extensions:
  - admonition           # note/warning/tip boxes
  - pymdownx.details     # collapsible sections
  - pymdownx.superfences # code blocks inside admonitions
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Course:
      - Lab 1 - SSH & OAK D Lite setup: weeks/week1/OAKlab.md
      - Lab 2 — Nodes, Topics & cmd_vel: weeks/week2/week2_lab.md
      - Lab 3 — Teleop, RViz2 & TF Tree: weeks/week3/week3_lab.md
      - Lab 4 — RR Model, FK & IK Scripts: weeks/week4/week4_lab.md
      - Lab 5 — Reinforcement Learning: weeks/week5/week5_lab.md
      - Lab 6 — LD19 Driver, LaserScan & Obstacle Detection: weeks/week6/week6_lab.md
      - Lab 7 — Cartographer, Occupancy Grid & Map Save/Load: weeks/week7/week7_lab.md
      - Lab 8 — Nav2, AMCL, Costmaps & Waypoint Following: weeks/week8/week8_lab.md
      - Lab 9 — IMX500, libcamera & YOLOv8 Inference: weeks/week9/week9_lab.md
      - Lab 10 — Autonomous Mapping + YOLO Object Detection: weeks/week10/week10_lab.md
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Gavinw575/MiniPupper_Tutorial

copyright: Copyright &copy; 2026 Gavin
